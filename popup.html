<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 360px;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      padding: 0;
      border-radius: 12px;
      overflow: hidden;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      background: linear-gradient(135deg, #1a1d27, #1e2130);
      border-bottom: 1px solid #2a2d3a;
    }

    .header img {
      width: 26px;
      height: 26px;
    }

    .header h1 {
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      flex: 1;
    }

    .lang-switcher {
      display: flex;
      gap: 2px;
      background: #13151d;
      border-radius: 6px;
      padding: 2px;
      border: 1px solid #2a2d3a;
    }

    .lang-btn {
      padding: 3px 7px;
      font-size: 9px;
      font-weight: 700;
      color: #666;
      background: transparent;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s;
      text-transform: uppercase;
    }

    .lang-btn:hover {
      color: #aaa;
    }

    .lang-btn.active {
      background: #8b5cf6;
      color: #fff;
      box-shadow: 0 1px 4px rgba(139, 92, 246, 0.4);
    }

    .header .version {
      font-size: 10px;
      color: #555;
      background: #1a1d27;
      padding: 2px 8px;
      border-radius: 10px;
      border: 1px solid #2a2d3a;
    }

    .stats-bar {
      display: flex;
      gap: 1px;
      background: #1a1d27;
      border-bottom: 1px solid #2a2d3a;
    }

    .stat-item {
      flex: 1;
      text-align: center;
      padding: 10px 8px;
      background: #151820;
    }

    .stat-value {
      font-size: 18px;
      font-weight: 800;
      color: #8b5cf6;
      line-height: 1;
    }

    .stat-label {
      font-size: 9px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 4px;
    }

    .content {
      padding: 12px 14px;
    }

    .status-grid {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 12px;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      background: #1a1d27;
      border-radius: 8px;
      border: 1px solid #2a2d3a;
      transition: border-color 0.2s;
    }

    .status-row:hover {
      border-color: #3a3d4a;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-ok {
      background: #10b981;
      box-shadow: 0 0 8px #10b98166;
    }

    .dot-warn {
      background: #f59e0b;
      box-shadow: 0 0 8px #f59e0b66;
    }

    .dot-err {
      background: #ef4444;
      box-shadow: 0 0 8px #ef444466;
    }

    .dot-loading {
      background: #8b5cf6;
      animation: pulse 1.2s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.3;
      }
    }

    .status-icon {
      font-size: 14px;
      width: 20px;
      text-align: center;
      flex-shrink: 0;
    }

    .status-label {
      font-size: 11px;
      font-weight: 600;
      flex: 1;
      color: #ccc;
    }

    .status-value {
      font-size: 10px;
      color: #777;
      text-align: right;
      max-width: 140px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .btn-row {
      display: flex;
      gap: 6px;
      margin-bottom: 6px;
    }

    .btn {
      flex: 1;
      padding: 9px 8px;
      border: none;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #8b5cf6, #7c3aed);
      color: #fff;
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      transform: translateY(-1px);
    }

    .btn-success {
      background: linear-gradient(135deg, #10b981, #059669);
      color: #fff;
    }

    .btn-success:hover {
      background: linear-gradient(135deg, #059669, #047857);
      transform: translateY(-1px);
    }

    .btn-warning {
      background: linear-gradient(135deg, #f59e0b, #d97706);
      color: #fff;
    }

    .btn-warning:hover {
      background: linear-gradient(135deg, #d97706, #b45309);
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: #1a1d27;
      color: #aaa;
      border: 1px solid #2a2d3a;
    }

    .btn-secondary:hover {
      background: #252838;
      border-color: #3a3d4a;
      color: #ccc;
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none !important;
    }

    .btn-full {
      width: 100%;
      margin-bottom: 6px;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background: #1a1d27;
      border-radius: 8px;
      border: 1px solid #2a2d3a;
      margin-bottom: 10px;
    }

    .toggle-row .toggle-label {
      font-size: 11px;
      color: #aaa;
      flex: 1;
    }

    .toggle-switch {
      position: relative;
      width: 36px;
      height: 20px;
      cursor: pointer;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: #333;
      border-radius: 20px;
      transition: 0.2s;
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 2px;
      bottom: 2px;
      background: #888;
      border-radius: 50%;
      transition: 0.2s;
    }

    .toggle-switch input:checked+.toggle-slider {
      background: #10b981;
    }

    .toggle-switch input:checked+.toggle-slider::before {
      transform: translateX(16px);
      background: #fff;
    }

    .result-box {
      padding: 8px 10px;
      background: #1a1d27;
      border-radius: 8px;
      border: 1px solid #2a2d3a;
      font-size: 10px;
      color: #777;
      display: none;
      word-break: break-all;
      max-height: 60px;
      overflow-y: auto;
      margin-bottom: 8px;
    }

    .result-box.show {
      display: block;
    }

    .result-box.success {
      border-color: #10b98133;
      color: #10b981;
    }

    .result-box.error {
      border-color: #ef444433;
      color: #ef4444;
    }

    .footer {
      text-align: center;
      font-size: 9px;
      color: #444;
      padding: 6px 0 10px;
    }
  </style>
</head>

<body>
  <div class="header">
    <img src="icon48.png" alt="icon">
    <h1>ShumTube Auth Helper</h1>
    <div class="lang-switcher">
      <button class="lang-btn" data-lang="ru">RU</button>
      <button class="lang-btn" data-lang="uz">UZ</button>
      <button class="lang-btn" data-lang="en">EN</button>
    </div>
    <span class="version">v1.0.0</span>
  </div>

  <div class="stats-bar">
    <div class="stat-item">
      <div class="stat-value" id="statTokens">0</div>
      <div class="stat-label" data-i18n="tokens">Токены</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="statStatus" style="font-size:14px;">—</div>
      <div class="stat-label" data-i18n="service">Сервис</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="statLast" style="font-size:11px;color:#777;">—</div>
      <div class="stat-label" data-i18n="lastToken">Последний</div>
    </div>
  </div>

  <div class="content">
    <div class="status-grid">
      <div class="status-row">
        <div class="status-dot dot-loading" id="dotBridge"></div>
        <span class="status-icon">🔗</span>
        <span class="status-label" data-i18n="appBridge">Связь с приложением</span>
        <span class="status-value" id="valBridge" data-i18n-val="checking">Проверка...</span>
      </div>
      <div class="status-row">
        <div class="status-dot dot-loading" id="dotTab"></div>
        <span class="status-icon">🌐</span>
        <span class="status-label" data-i18n="labsSession">Сессия Labs</span>
        <span class="status-value" id="valTab" data-i18n-val="checking">Проверка...</span>
      </div>
      <div class="status-row">
        <div class="status-dot dot-loading" id="dotLogin"></div>
        <span class="status-icon">👤</span>
        <span class="status-label" data-i18n="account">Аккаунт</span>
        <span class="status-value" id="valLogin" data-i18n-val="checking">Проверка...</span>
      </div>
      <div class="status-row">
        <div class="status-dot dot-loading" id="dotRecaptcha"></div>
        <span class="status-icon">🛡️</span>
        <span class="status-label" data-i18n="verification">Верификация</span>
        <span class="status-value" id="valRecaptcha" data-i18n-val="checking">Проверка...</span>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" id="btnTest"><span>🔍</span> <span data-i18n="check">Проверить</span></button>
      <button class="btn btn-success" id="btnTestCaptcha"><span>⚡</span> <span data-i18n="verify">Тест</span></button>
      <button class="btn btn-warning" id="btnRefresh"><span>🔄</span> <span data-i18n="refresh">Обновить</span></button>
    </div>

    <button class="btn btn-secondary btn-full" id="btnOpenTab">📂 <span data-i18n="openLabs">Открыть Google Labs</span></button>

    <div class="toggle-row">
      <span class="toggle-label">🔄 <span data-i18n="autoRefresh">Авто-обновление сессии (10 мин)</span></span>
      <label class="toggle-switch">
        <input type="checkbox" id="toggleAutoRefresh" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>

    <div class="result-box" id="resultBox"></div>

    <div class="footer" data-i18n="footer">Сервис аутентификации ShumTube</div>
  </div>

  <script src="i18n.js"></script>
  <script src="popup.js"></script>
</body>

</html>
